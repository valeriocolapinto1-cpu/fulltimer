name: fulltimer
description: FullTimer - Professional WCA Speedcubing Timer
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.5
  # Storage
  shared_preferences: ^2.3.5
  # Backend — Supabase (replaces Firebase)
  supabase_flutter: ^2.9.1
  # Auth
  url_launcher: ^6.3.0
  flutter_secure_storage: ^10.1.0
  # Networking
  http: ^1.2.2
  crypto: ^3.0.3
  # Utils
  uuid: ^4.5.1
  google_fonts: ^8.1.0
  share_plus: ^13.1.0
  cuber: ^0.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
